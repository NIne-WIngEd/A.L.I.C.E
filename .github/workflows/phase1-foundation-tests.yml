name: Phase 1 foundation tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            requirements-phase1.txt
            requirements-auto-review.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pip install -r requirements-phase1.txt
          python -m pip install -r requirements-auto-review.txt

      - name: Validate Phase 0 policies
        run: python scripts/validate_phase0.py

      - name: Run Phase 1 unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
